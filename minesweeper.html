<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Neon Cyber-Edition (Frame Fixed)</title>
    <style>
        :root {
            --bg: #0a0b10;
            --container-bg: #111424;
            --cell-bg: #1a1d36;
            --cell-hover: #252b4e;
            --cell-revealed: #06070c;
            --accent: #00f3ff;   /* Neon Cyan */
            --mine: #ff0055;     /* Neon Pink */
            --flag: #ffea00;     /* Neon Yellow */
            --win: #00ff66;      /* Neon Lime */
            --text-glow: 0 0 8px currentColor;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1b1e36 0%, #0a0b10 100%);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .game-container {
            text-align: center;
            padding: 25px;
            background: var(--container-bg);
            border-radius: 16px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.25), inset 0 0 15px rgba(0, 243, 255, 0.1);
            transform: translate3d(0, 0, 0);
            will-change: transform;
            /* CRITICAL FIX: Forces container to hug the board width, preventing rectangular stretching */
            width: fit-content; 
            max-width: 100%;
            margin: 0 auto;
        }

        /* Screen Shake FX */
        .shake {
            animation: screenShake 0.4s cubic-bezier(.36,.07,.19,.97) forwards;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 90% { transform: translate3d(-4px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--accent);
            background: var(--cell-bg);
            color: #fff;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-shadow: var(--text-glow);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
            transition: all 0.2s ease;
        }

        select:focus, button:focus {
            outline: none;
        }

        button:hover { 
            background: var(--accent); 
            color: var(--bg); 
            box-shadow: 0 0 15px var(--accent);
            text-shadow: none;
        }

        .board-wrapper {
            max-width: 100%;
            overflow-x: auto;
            padding: 5px;
            border-radius: 8px;
        }

        #board {
            display: grid;
            gap: 5px;
            background: #000000;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            margin: 0 auto;
            user-select: none;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        .cell {
            width: 32px;
            height: 32px;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1.2rem;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.1s, transform 0.05s, box-shadow 0.1s;
        }

        .cell:hover:not(.revealed) { 
            background: var(--cell-hover); 
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }
        
        .cell:active:not(.revealed) {
            transform: scale(0.9);
        }

        .cell.revealed { 
            background: var(--cell-revealed); 
            border-color: rgba(255, 255, 255, 0.02);
            cursor: default; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.6);
        }

        .cell.mine { 
            background: var(--mine) !important; 
            border-color: var(--mine);
            box-shadow: 0 0 15px var(--mine);
            animation: pulse 1.5s infinite alternate;
        }

        .cell.flagged { 
            color: var(--flag); 
            text-shadow: var(--text-glow);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 8px var(--mine); }
            100% { box-shadow: 0 0 20px var(--mine); }
        }

        /* Neon Numbers */
        .n1 { color: #00f3ff; text-shadow: 0 0 8px rgba(0, 243, 255, 0.8); }
        .n2 { color: #00ff66; text-shadow: 0 0 8px rgba(0, 255, 102, 0.8); }
        .n3 { color: #ff0055; text-shadow: 0 0 8px rgba(255, 0, 85, 0.8); }
        .n4 { color: #bd00ff; text-shadow: 0 0 8px rgba(189, 0, 255, 0.8); }
        .n5 { color: #ffea00; text-shadow: 0 0 8px rgba(255, 234, 0, 0.8); }
        .n6 { color: #ff9900; text-shadow: 0 0 8px rgba(255, 153, 0, 0.8); }
        .n7 { color: #e056fd; text-shadow: 0 0 8px rgba(224, 86, 253, 0.8); }
        .n8 { color: #ffffff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.8); }

        .game-over { 
            margin-top: 20px; 
            font-size: 1.3rem; 
            font-weight: bold;
            line-height: 1.4;
            color: var(--mine); 
            text-shadow: 0 0 10px var(--mine);
        }
        .win { 
            color: var(--win); 
            text-shadow: 0 0 10px var(--win);
        }
    </style>
</head>
<body>

    <div class="game-container" id="container">
        <div class="stats">
            <span style="color: var(--flag);">⚡ <span id="mine-count">0</span></span>
            <span id="status">SYS_OK</span>
            <span style="color: var(--accent);">⏱️ <span id="timer">0</span></span>
        </div>

        <div class="controls">
            <select id="difficulty" onchange="initGame()">
                <option value="easy">CORE: EASY</option>
                <option value="medium">NODE: MEDIUM</option>
                <option value="hard">GRID: HARD</option>
            </select>
            <button onclick="initGame()">REBOOT</button>
        </div>

        <div class="board-wrapper">
            <div id="board"></div>
        </div>
        <div id="message"></div>
    </div>

    <script>
        const containerElement = document.getElementById('container');
        const boardElement = document.getElementById('board');
        const mineDisplay = document.getElementById('mine-count');
        const timerDisplay = document.getElementById('timer');
        const statusIcon = document.getElementById('status');
        const difficultySelect = document.getElementById('difficulty');

        let rows, cols, minesCount;
        let board = [];
        let flags = 0;
        let timer = 0;
        let timerInterval;
        let gameOver = false;
        let firstClick = true;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn("Audio interface blocked.");
                }
            }
        }

        function playSynthFX(freq, type, duration, volume, frequencyDrop = 0) {
            initAudio();
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (frequencyDrop > 0) {
                    osc.frequency.exponentialRampToValueAtTime(frequencyDrop, audioCtx.currentTime + duration);
                }
                
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        const config = {
            easy: { r: 9, c: 9, m: 10 },
            medium: { r: 16, c: 16, m: 40 },
            hard: { r: 16, c: 30, m: 99 }
        };

        function initGame() {
            const level = difficultySelect.value;
            rows = config[level].r;
            cols = config[level].c;
            minesCount = config[level].m;
            
            boardElement.style.gridTemplateColumns = `repeat(${cols}, 32px)`;
            boardElement.innerHTML = '';
            document.getElementById('message').innerHTML = '';
            containerElement.classList.remove('shake');
            
            clearInterval(timerInterval);
            timer = 0;
            timerDisplay.innerText = 0;
            flags = 0;
            mineDisplay.innerText = minesCount;
            gameOver = false;
            firstClick = true;
            statusIcon.innerText = 'SYS_OK';
            statusIcon.style.color = '#fff';
            
            board = Array.from({ length: rows }, () => Array(cols).fill(0).map(() => ({
                isMine: false,
                revealed: false,
                flagged: false,
                neighborMines: 0
            })));

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    
                    cell.addEventListener('click', (e) => {
                        e.preventDefault();
                        handleLeftClick(r, c);
                    });
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    boardElement.appendChild(cell);
                }
            }
        }

        function placeMines(exR, exC) {
            let placed = 0;
            while (placed < minesCount) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!board[r][c].isMine && (Math.abs(r - exR) > 1 || Math.abs(c - exC) > 1)) {
                    board[r][c].isMine = true;
                    placed++;
                }
            }
            calculateNumbers();
        }

        function calculateNumbers() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].isMine) continue;
                    let count = 0;
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            if (board[r + i]?.[c + j]?.isMine) count++;
                        }
                    }
                    board[r][c].neighborMines = count;
                }
            }
        }

        function handleLeftClick(r, c) {
            if (gameOver || board[r][c].flagged || board[r][c].revealed) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (board[r][c].isMine) {
                playSynthFX(180, 'sawtooth', 0.8, 0.3, 20);
                containerElement.classList.add('shake');
                setTimeout(() => containerElement.classList.remove('shake'), 400);
                endGame(false);
                return;
            }

            playSynthFX(800, 'sine', 0.05, 0.1);
            revealCell(r, c);
            checkWin();
        }

        function revealCell(r, c) {
            const cell = board[r][c];
            if (cell.revealed || cell.flagged) return;

            cell.revealed = true;
            const el = getCellEl(r, c);
            el.classList.add('revealed');

            if (cell.neighborMines > 0) {
                el.innerText = cell.neighborMines;
                el.classList.add(`n${cell.neighborMines}`);
            } else {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        if (board[r + i]?.[c + j]) revealCell(r + i, c + j);
                    }
                }
            }
        }

        function handleRightClick(r, c) {
            if (gameOver || board[r][c].revealed) return;
            const cell = board[r][c];
            const el = getCellEl(r, c);

            cell.flagged = !cell.flagged;
            el.innerText = cell.flagged ? '⚡' : '';
            el.classList.toggle('flagged');
            flags += cell.flagged ? 1 : -1;
            mineDisplay.innerText = minesCount - flags;

            playSynthFX(cell.flagged ? 450 : 300, 'triangle', 0.1, 0.15);
        }

        function getCellEl(r, c) {
            return boardElement.children[r * cols + c];
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                timerDisplay.innerText = timer;
                if (timer % 1 === 0) playSynthFX(1200, 'sine', 0.005, 0.02);
            }, 1000);
        }

        function checkWin() {
            let revealedCount = 0;
            board.flat().forEach(cell => { if (cell.revealed) revealedCount++; });
            if (revealedCount === (rows * cols) - minesCount) {
                endGame(true);
            }
        }

        function endGame(won) {
            gameOver = true;
            clearInterval(timerInterval);
            
            if (won) {
                statusIcon.innerText = 'SYS_WIN';
                statusIcon.style.color = 'var(--win)';
                setTimeout(() => playSynthFX(523.25, 'sine', 0.15, 0.1), 0);
                setTimeout(() => playSynthFX(659.25, 'sine', 0.15, 0.1), 100);
                setTimeout(() => playSynthFX(783.99, 'sine', 0.15, 0.1), 200);
                setTimeout(() => playSynthFX(1046.50, 'sine', 0.4, 0.15), 300);
            } else {
                statusIcon.innerText = 'CRITICAL';
                statusIcon.style.color = 'var(--mine)';
            }
            
            board.flat().forEach((cell, idx) => {
                if (cell.isMine) {
                    boardElement.children[idx].classList.add('mine');
                    boardElement.children[idx].innerText = '💥';
                }
            });

            /* CRITICAL FIX: Splitting text into wrapped rows stops horizontal layout blowout */
            document.getElementById('message').innerHTML = won 
                ? `<div class="game-over win">MATRIX CLEARED<br>TIME: ${timer}s</div>` 
                : `<div class="game-over">SYSTEM CORRUPTED.<br>REBOOT REQUIRED.</div>`;
        }

        initGame();
    </script>
</body>
</html>
