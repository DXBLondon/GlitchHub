<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlitchHub - Free Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');
        
        * {
            font-family: 'Outfit', sans-serif;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0033 25%, #0a0033 50%, #0f0f1e 75%, #000000 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        
        /* Glitch Effect */
        .glitch {
            position: relative;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            animation: glitch-animation 0.15s infinite;
        }
        
        @keyframes glitch-animation {
            0% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(0);
            }
            20% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(-2px, 2px);
            }
            40% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(-2px, -2px);
            }
            60% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(2px, 2px);
            }
            80% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(2px, -2px);
            }
            100% {
                text-shadow: 
                    0 0 10px rgba(0, 255, 0, 0.8),
                    2px 2px 0px rgba(255, 0, 0, 0.8),
                    -2px -2px 0px rgba(0, 0, 255, 0.8);
                transform: translate(0);
            }
        }

        /* Animated gradient blob */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            mix-blend-mode: screen;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.3) 0%, transparent 70%);
            top: 10%;
            right: 10%;
            animation: blob-move-1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.2) 0%, transparent 70%);
            bottom: 20%;
            left: 5%;
            animation: blob-move-2 10s ease-in-out infinite;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.2) 0%, transparent 70%);
            bottom: 10%;
            right: 5%;
            animation: blob-move-3 12s ease-in-out infinite;
        }

        @keyframes blob-move-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 50px) scale(0.9); }
        }

        @keyframes blob-move-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-50px, 50px) scale(0.9); }
            66% { transform: translate(50px, -30px) scale(1.1); }
        }

        @keyframes blob-move-3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, 50px) scale(1.05); }
            66% { transform: translate(-50px, -30px) scale(0.95); }
        }

        /* CTA Button */
        .cta-button {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            transition: left 0.4s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.6), 0 15px 35px rgba(0, 255, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        /* Pulse Text */
        .pulse-text {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
            50% { opacity: 0.6; text-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        /* Fade In Up */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
        }

        /* Game Card */
        .game-card {
            background: rgba(0, 255, 0, 0.03);
            border: 1.5px solid rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 20px rgba(0, 255, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            background: rgba(0, 255, 0, 0.08);
            border-color: rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3), inset 0 0 30px rgba(0, 255, 0, 0.05);
            transform: translateY(-15px) scale(1.05);
        }

        .game-icon {
            font-size: 4rem;
            color: #00ff00;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transition: all 0.4s ease;
        }

        .game-card:hover .game-icon {
            transform: scale(1.2) rotate(10deg);
            text-shadow: 0 0 40px rgba(0, 255, 0, 0.6);
        }

        /* Secondary Button */
        .secondary-button {
            background: rgba(0, 255, 0, 0.08);
            border: 2px solid rgba(0, 255, 0, 0.4);
            color: #00ff00;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .secondary-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 255, 0, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .secondary-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .secondary-button:hover {
            border-color: rgba(0, 255, 0, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }

        /* Navigation */
        nav {
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        }

        nav a {
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #00ff00;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.3), transparent);
        }

        /* Hide sections */
        .games-section,
        .game-container {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .games-section.active,
        .game-container.active {
            display: block;
            opacity: 1;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 80px;
            left: 30px;
            z-index: 40;
            display: none;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid rgba(0, 255, 0, 0.4);
            color: #00ff00;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(0, 255, 0, 0.2);
            border-color: rgba(0, 255, 0, 0.8);
        }

        .back-button.show {
            display: block;
        }

        /* Game Canvas */
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #000;
            border: 2px solid rgba(0, 255, 0, 0.5);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        /* Game Score */
        .game-score {
            text-align: center;
            font-size: 2rem;
            color: #00ff00;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-weight: bold;
        }

        .game-controls {
            text-align: center;
            margin: 20px 0;
        }

        .game-controls button {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .game-controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .game-info {
            color: #00ff00;
            text-align: center;
            margin: 15px 0;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="text-white overflow-x-hidden">
    <!-- Navigation -->
    <nav class="fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black glitch" style="animation: none; letter-spacing: 2px;" onclick="goHome()" style="cursor: pointer;">
                <i class="fas fa-bolt"></i> GLITCH
            </div>
            <div class="hidden md:flex gap-8 items-center">
                <a href="#" onclick="goHome()" class="text-sm font-medium uppercase tracking-wider hover:text-green-400">Home</a>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button md:hidden text-green-400 text-xl" id="backBtn" onclick="goHome()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <!-- Hero Section (Home) -->
    <section id="home-section" class="min-h-screen flex items-center justify-center relative pt-20 overflow-hidden">
        <!-- Animated Blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        
        <div class="relative z-10 text-center px-6 max-w-5xl fade-in-up">
            <h1 class="text-7xl md:text-8xl font-black mb-6 leading-tight">
                Welcome to<br>
                <span class="glitch">GLITCH</span>
            </h1>

            <p class="text-xl md:text-2xl text-gray-300 mb-12 leading-relaxed max-w-3xl mx-auto font-light">
                Explore a world of free games and entertainment. No paywalls, no ads, just pure fun.
            </p>
            
            <button class="cta-button px-12 py-5 rounded-lg text-2xl uppercase font-bold tracking-wider" onclick="enterGames()">
                <i class="fas fa-rocket mr-3"></i> Launch
            </button>

            <!-- Scroll Indicator -->
            <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 pulse-text">
                <i class="fas fa-chevron-down text-3xl text-green-400"></i>
            </div>
        </div>
    </section>

    <!-- Games Section -->
    <section id="games-section" class="games-section min-h-screen py-32 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-20">
                <h2 class="text-6xl md:text-7xl font-black mb-6">
                    Choose Your <span class="text-green-400">Game</span>
                </h2>
                <div class="divider my-8"></div>
                <p class="text-xl text-gray-400 max-w-2xl mx-auto">
                    Pick from our collection of free games and start playing instantly
                </p>
            </div>

            <div class="grid md:grid-cols-3 gap-8">
                <!-- Game 1: Snake -->
                <button onclick="startGame('snake')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-snake"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Snake</h3>
                    <p class="text-gray-300 mb-6">The classic arcade game. Navigate and grow while avoiding walls.</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>

                <!-- Game 2: Memory Match -->
                <button onclick="startGame('memory')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-chess"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Memory Match</h3>
                    <p class="text-gray-300 mb-6">Test your memory by matching tiles. Challenge yourself to beat your record.</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>

                <!-- Game 3: Flappy Bird -->
                <button onclick="startGame('flappy')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Flappy Bird</h3>
                    <p class="text-gray-300 mb-6">Navigate through obstacles. One tap to fly, timing is everything.</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>

                <!-- Game 4: Dice Game -->
                <button onclick="startGame('dice')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-dice"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Dice Game</h3>
                    <p class="text-gray-300 mb-6">Roll the dice and test your luck. Reach 21 without going over.</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>

                <!-- Game 5: Star Clicker -->
                <button onclick="startGame('clicker')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Star Clicker</h3>
                    <p class="text-gray-300 mb-6">Click stars as fast as you can. How many can you collect in 30 seconds?</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>

                <!-- Game 6: Pong -->
                <button onclick="startGame('pong')" class="game-card p-8 rounded-2xl text-center group hover:no-underline" style="text-decoration: none; background: rgba(0, 255, 0, 0.03); border: 1.5px solid rgba(0, 255, 0, 0.2);">
                    <div class="game-icon">
                        <i class="fas fa-table-tennis"></i>
                    </div>
                    <h3 class="text-3xl font-bold mb-3">Pong</h3>
                    <p class="text-gray-300 mb-6">Classic paddle game. Use arrow keys or mouse to move your paddle.</p>
                    <div class="secondary-button px-8 py-3 rounded-lg text-center inline-block relative z-20">
                        Play Now
                    </div>
                </button>
            </div>
        </div>
    </section>

    <!-- Game Container -->
    <section id="game-container" class="game-container min-h-screen py-20 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-8">
                <h2 class="text-5xl font-black text-green-400 mb-4" id="gameTitle">Game</h2>
                <div class="game-score" id="gameScore">Score: 0</div>
                <div class="game-info" id="gameInfo"></div>
            </div>

            <div class="text-center mb-8">
                <canvas id="gameCanvas" width="800" height="400"></canvas>
            </div>

            <div class="game-controls">
                <button id="startBtn" onclick="handleGameAction('start')">Start Game</button>
                <button id="pauseBtn" onclick="handleGameAction('pause')" style="display: none;">Pause</button>
                <button id="resumeBtn" onclick="handleGameAction('resume')" style="display: none;">Resume</button>
                <button onclick="goHome()" class="secondary-button" style="background: rgba(255, 0, 0, 0.1); border-color: rgba(255, 0, 0, 0.4); color: #ff6b6b;">Back to Menu</button>
            </div>

            <div id="gameInstructions" class="mt-8 text-gray-300 text-center"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-16 px-6 border-t border-green-500/20 bg-black/40">
        <div class="max-w-6xl mx-auto text-center text-gray-400">
            <p>&copy; 2026 GlitchHub. All rights reserved. Built with <span class="text-red-500 text-lg">❤</span> for gamers.</p>
        </div>
    </footer>

    <script>
        let currentGame = null;
        let gameState = null;
        let animationId = null;

        // Navigation functions
        function enterGames() {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('games-section').classList.add('active');
            document.getElementById('backBtn').classList.add('show');
            window.scrollTo(0, 0);
        }

        function goHome() {
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('home-section').style.display = 'flex';
            document.getElementById('games-section').classList.remove('active');
            document.getElementById('game-container').classList.remove('active');
            document.getElementById('backBtn').classList.remove('show');
            currentGame = null;
            gameState = null;
            window.scrollTo(0, 0);
        }

        function startGame(gameName) {
            document.getElementById('games-section').classList.remove('active');
            document.getElementById('game-container').classList.add('active');
            currentGame = gameName;
            initializeGame(gameName);
            window.scrollTo(0, 0);
        }

        function handleGameAction(action) {
            if (gameState) {
                gameState.action = action;
            }
        }

        // Game Initialization
        function initializeGame(gameName) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resumeBtn = document.getElementById('resumeBtn');
            const title = document.getElementById('gameTitle');
            const instructions = document.getElementById('gameInstructions');

            // Clear previous animation
            if (animationId) cancelAnimationFrame(animationId);

            switch(gameName) {
                case 'snake':
                    title.textContent = 'Snake';
                    instructions.innerHTML = 'Use arrow keys to move. Eat food to grow. Don\'t hit the walls!';
                    initSnake(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
                case 'memory':
                    title.textContent = 'Memory Match';
                    instructions.innerHTML = 'Click tiles to find matching pairs. Try to match all tiles!';
                    initMemory(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
                case 'flappy':
                    title.textContent = 'Flappy Bird';
                    instructions.innerHTML = 'Click or press SPACE to make the bird fly. Avoid the pipes!';
                    initFlappy(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
                case 'dice':
                    title.textContent = 'Dice Game';
                    instructions.innerHTML = 'Roll the dice. Try to reach exactly 21 without going over!';
                    initDice(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
                case 'clicker':
                    title.textContent = 'Star Clicker';
                    instructions.innerHTML = 'Click the stars as fast as you can! 30 seconds timer.';
                    initClicker(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
                case 'pong':
                    title.textContent = 'Pong';
                    instructions.innerHTML = 'Use arrow keys (↑↓) to move your paddle. Win by scoring!';
                    initPong(canvas, ctx, startBtn, pauseBtn, resumeBtn);
                    break;
            }
        }

        // SNAKE GAME
        function initSnake(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            gameState = {
                snake: [{x: 200, y: 200}],
                food: {x: 300, y: 300},
                direction: {x: 10, y: 0},
                nextDirection: {x: 10, y: 0},
                score: 0,
                gameOver: false,
                paused: false,
                running: false,
                action: null
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
            resumeBtn.style.display = 'none';

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.gameOver = false;
                    startBtn.style.display = 'none';
                    pauseBtn.style.display = 'block';
                    gameState.snake = [{x: 200, y: 200}];
                    gameState.food = getRandomFood();
                    gameState.score = 0;
                    gameState.direction = {x: 10, y: 0};
                    gameState.nextDirection = {x: 10, y: 0};
                    playSnake(canvas, ctx, pauseBtn, resumeBtn, startBtn);
                }
            };

            document.onkeydown = function(e) {
                if (!gameState.running) return;
                if (e.key === 'ArrowUp' && gameState.direction.y === 0) gameState.nextDirection = {x: 0, y: -10};
                if (e.key === 'ArrowDown' && gameState.direction.y === 0) gameState.nextDirection = {x: 0, y: 10};
                if (e.key === 'ArrowLeft' && gameState.direction.x === 0) gameState.nextDirection = {x: -10, y: 0};
                if (e.key === 'ArrowRight' && gameState.direction.x === 0) gameState.nextDirection = {x: 10, y: 0};
            };

            function getRandomFood() {
                return {
                    x: Math.floor(Math.random() * 80) * 10,
                    y: Math.floor(Math.random() * 40) * 10
                };
            }

            function playSnake(canvas, ctx, pauseBtn, resumeBtn, startBtn) {
                if (gameState.action === 'pause') {
                    gameState.paused = true;
                    gameState.action = null;
                    pauseBtn.style.display = 'none';
                    resumeBtn.style.display = 'block';
                    drawSnake(canvas, ctx);
                    return;
                }
                if (gameState.action === 'resume') {
                    gameState.paused = false;
                    gameState.action = null;
                    pauseBtn.style.display = 'block';
                    resumeBtn.style.display = 'none';
                }

                if (gameState.paused) {
                    animationId = requestAnimationFrame(() => playSnake(canvas, ctx, pauseBtn, resumeBtn, startBtn));
                    return;
                }

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                gameState.direction = gameState.nextDirection;
                let head = {x: gameState.snake[0].x + gameState.direction.x, y: gameState.snake[0].y + gameState.direction.y};

                if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                    gameState.gameOver = true;
                    gameState.running = false;
                    pauseBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Game Over! Click to Restart';
                    document.getElementById('gameScore').textContent = `Score: ${gameState.score} - Game Over!`;
                    drawSnake(canvas, ctx);
                    return;
                }

                if (head.x === gameState.food.x && head.y === gameState.food.y) {
                    gameState.score += 10;
                    gameState.food = getRandomFood();
                } else {
                    gameState.snake.pop();
                }

                for (let segment of gameState.snake) {
                    if (segment.x === head.x && segment.y === head.y) {
                        gameState.gameOver = true;
                        gameState.running = false;
                        pauseBtn.style.display = 'none';
                        startBtn.style.display = 'block';
                        startBtn.textContent = 'Game Over! Click to Restart';
                        document.getElementById('gameScore').textContent = `Score: ${gameState.score} - Game Over!`;
                        drawSnake(canvas, ctx);
                        return;
                    }
                }

                gameState.snake.unshift(head);
                drawSnake(canvas, ctx);
                document.getElementById('gameScore').textContent = `Score: ${gameState.score}`;

                animationId = requestAnimationFrame(() => playSnake(canvas, ctx, pauseBtn, resumeBtn, startBtn));
            }

            function drawSnake(canvas, ctx) {
                // Draw food
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(gameState.food.x, gameState.food.y, 10, 10);

                // Draw snake
                for (let i = 0; i < gameState.snake.length; i++) {
                    ctx.fillStyle = i === 0 ? '#00ff00' : '#00cc00';
                    ctx.fillRect(gameState.snake[i].x, gameState.snake[i].y, 10, 10);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(gameState.snake[i].x, gameState.snake[i].y, 10, 10);
                }
            }
        }

        // MEMORY MATCH GAME
        function initMemory(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            const cards = [];
            const symbols = ['⭐', '🎮', '🚀', '💎', '⚡', '🌟', '🎯', '🔥'];
            
            for (let i = 0; i < 16; i++) {
                cards.push({
                    symbol: symbols[i % 8],
                    revealed: false,
                    matched: false,
                    x: (i % 4) * 150 + 50,
                    y: Math.floor(i / 4) * 80 + 50,
                    width: 120,
                    height: 60
                });
            }

            gameState = {
                cards: cards,
                flipped: [],
                matches: 0,
                score: 0,
                running: false,
                paused: false,
                action: null
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.flipped = [];
                    gameState.matches = 0;
                    gameState.score = 0;
                    startBtn.style.display = 'none';
                    pauseBtn.style.display = 'block';
                    playMemory(canvas, ctx, pauseBtn, resumeBtn, startBtn);
                }
            };

            canvas.onclick = function(e) {
                if (!gameState.running || gameState.flipped.length >= 2) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                for (let card of gameState.cards) {
                    if (x > card.x && x < card.x + card.width && 
                        y > card.y && y < card.y + card.height && 
                        !card.matched && !card.revealed) {
                        card.revealed = true;
                        gameState.flipped.push(card);
                        break;
                    }
                }

                if (gameState.flipped.length === 2) {
                    if (gameState.flipped[0].symbol === gameState.flipped[1].symbol) {
                        gameState.flipped[0].matched = true;
                        gameState.flipped[1].matched = true;
                        gameState.score += 10;
                        gameState.matches++;
                    }
                    setTimeout(() => {
                        gameState.flipped[0].revealed = false;
                        gameState.flipped[1].revealed = false;
                        gameState.flipped = [];
                    }, 800);
                }
            };

            function playMemory(canvas, ctx, pauseBtn, resumeBtn, startBtn) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let card of gameState.cards) {
                    ctx.fillStyle = card.matched ? rgba(0, 255, 0, 0.1) : rgba(0, 255, 0, 0.3);
                    ctx.fillRect(card.x, card.y, card.width, card.height);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(card.x, card.y, card.width, card.height);

                    if (card.revealed || card.matched) {
                        ctx.fillStyle = '#00ff00';
                        ctx.font = '48px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(card.symbol, card.x + card.width/2, card.y + card.height/2);
                    }
                }

                document.getElementById('gameScore').textContent = `Score: ${gameState.score} | Matches: ${gameState.matches}/8`;

                if (gameState.matches === 8) {
                    gameState.running = false;
                    pauseBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'You Won! Play Again?';
                    document.getElementById('gameScore').textContent = `Score: ${gameState.score} - YOU WON!`;
                    return;
                }

                animationId = requestAnimationFrame(() => playMemory(canvas, ctx, pauseBtn, resumeBtn, startBtn));
            }

            function rgba(r, g, b, a) {
                return `rgba(${r}, ${g}, ${b}, ${a})`;
            }

            playMemory(canvas, ctx, pauseBtn, resumeBtn, startBtn);
        }

        // FLAPPY BIRD GAME
        function initFlappy(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            gameState = {
                bird: {x: 50, y: canvas.height / 2, width: 20, height: 20, velocity: 0},
                pipes: [],
                score: 0,
                running: false,
                paused: false,
                gameOver: false,
                pipeCount: 0,
                action: null
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';

            function jump() {
                if (gameState.running && !gameState.paused) {
                    gameState.bird.velocity = -8;
                }
            }

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.gameOver = false;
                    gameState.bird = {x: 50, y: canvas.height / 2, width: 20, height: 20, velocity: 0};
                    gameState.pipes = [];
                    gameState.score = 0;
                    gameState.pipeCount = 0;
                    startBtn.style.display = 'none';
                    pauseBtn.style.display = 'block';
                    playFlappy(canvas, ctx, pauseBtn, resumeBtn, startBtn);
                }
            };

            document.onkeydown = function(e) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    jump();
                }
            };

            canvas.onclick = jump;

            function playFlappy(canvas, ctx, pauseBtn, resumeBtn, startBtn) {
                if (gameState.action === 'pause') {
                    gameState.paused = true;
                    gameState.action = null;
                    pauseBtn.style.display = 'none';
                    resumeBtn.style.display = 'block';
                    drawFlappy(canvas, ctx);
                    return;
                }
                if (gameState.action === 'resume') {
                    gameState.paused = false;
                    gameState.action = null;
                    pauseBtn.style.display = 'block';
                    resumeBtn.style.display = 'none';
                }

                if (gameState.paused) {
                    animationId = requestAnimationFrame(() => playFlappy(canvas, ctx, pauseBtn, resumeBtn, startBtn));
                    return;
                }

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                gameState.bird.velocity += 0.4;
                gameState.bird.y += gameState.bird.velocity;

                if (gameState.pipeCount % 80 === 0) {
                    const gapSize = 100;
                    const gapY = Math.random() * (canvas.height - gapSize - 50) + 25;
                    gameState.pipes.push({x: canvas.width, topHeight: gapY, gapHeight: gapSize});
                    gameState.pipeCount = 0;
                }
                gameState.pipeCount++;

                for (let i = gameState.pipes.length - 1; i >= 0; i--) {
                    gameState.pipes[i].x -= 5;
                    
                    if (gameState.pipes[i].x < -50) {
                        gameState.pipes.splice(i, 1);
                        gameState.score++;
                    }
                }

                if (gameState.bird.y + gameState.bird.height > canvas.height || gameState.bird.y < 0) {
                    gameState.gameOver = true;
                    gameState.running = false;
                    pauseBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Game Over! Try Again?';
                    document.getElementById('gameScore').textContent = `Score: ${gameState.score} - Game Over!`;
                    drawFlappy(canvas, ctx);
                    return;
                }

                for (let pipe of gameState.pipes) {
                    if (gameState.bird.x < pipe.x + 50 && gameState.bird.x + gameState.bird.width > pipe.x) {
                        if (gameState.bird.y < pipe.topHeight || gameState.bird.y + gameState.bird.height > pipe.topHeight + pipe.gapHeight) {
                            gameState.gameOver = true;
                            gameState.running = false;
                            pauseBtn.style.display = 'none';
                            startBtn.style.display = 'block';
                            startBtn.textContent = 'Game Over! Try Again?';
                            document.getElementById('gameScore').textContent = `Score: ${gameState.score} - Game Over!`;
                            drawFlappy(canvas, ctx);
                            return;
                        }
                    }
                }

                drawFlappy(canvas, ctx);
                document.getElementById('gameScore').textContent = `Score: ${gameState.score}`;

                animationId = requestAnimationFrame(() => playFlappy(canvas, ctx, pauseBtn, resumeBtn, startBtn));
            }

            function drawFlappy(canvas, ctx) {
                // Draw pipes
                ctx.fillStyle = '#ff6b6b';
                for (let pipe of gameState.pipes) {
                    ctx.fillRect(pipe.x, 0, 50, pipe.topHeight);
                    ctx.fillRect(pipe.x, pipe.topHeight + pipe.gapHeight, 50, canvas.height - pipe.topHeight - pipe.gapHeight);
                }

                // Draw bird
                ctx.fillStyle = '#ffeb3b';
                ctx.fillRect(gameState.bird.x, gameState.bird.y, gameState.bird.width, gameState.bird.height);
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(gameState.bird.x, gameState.bird.y, gameState.bird.width, gameState.bird.height);
            }
        }

        // DICE GAME
        function initDice(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            gameState = {
                playerSum: 0,
                computerSum: 0,
                playerStanding: false,
                computerTurn: false,
                gameOver: false,
                running: false,
                rolls: [],
                action: null
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.playerSum = 0;
                    gameState.computerSum = 0;
                    gameState.playerStanding = false;
                    gameState.computerTurn = false;
                    gameState.gameOver = false;
                    gameState.rolls = [];
                    startBtn.style.display = 'none';
                    pauseBtn.textContent = 'Roll Dice';
                    pauseBtn.style.display = 'block';
                    pauseBtn.onclick = function() { if (gameState.running) rollDice(); };
                    playDice(canvas, ctx, pauseBtn, startBtn);
                }
            };

            function rollDice() {
                if (gameState.playerStanding) return;
                const roll = Math.floor(Math.random() * 6) + 1;
                gameState.playerSum += roll;
                gameState.rolls.push({value: roll, isPlayer: true});

                if (gameState.playerSum > 21) {
                    gameState.gameOver = true;
                    gameState.running = false;
                    pauseBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Bust! Play Again?';
                    document.getElementById('gameScore').textContent = `You: ${gameState.playerSum} - BUST! Computer Wins!`;
                }
                playDice(canvas, ctx, pauseBtn, startBtn);
            }

            document.onkeydown = function(e) {
                if (e.key === ' ') {
                    e.preventDefault();
                    rollDice();
                } else if (e.key === 'Enter' && !gameState.playerStanding) {
                    gameState.playerStanding = true;
                    pauseBtn.textContent = 'Computer Turn...';
                    pauseBtn.disabled = true;
                    
                    setTimeout(() => {
                        gameState.computerTurn = true;
                        computerPlay(canvas, ctx, pauseBtn, startBtn);
                    }, 1000);
                }
            };

            function computerPlay(canvas, ctx, pauseBtn, startBtn) {
                if (gameState.computerSum < 17) {
                    const roll = Math.floor(Math.random() * 6) + 1;
                    gameState.computerSum += roll;
                    gameState.rolls.push({value: roll, isPlayer: false});
                    
                    if (gameState.computerSum > 21) {
                        gameState.gameOver = true;
                        document.getElementById('gameScore').textContent = `You: ${gameState.playerSum} vs Computer: ${gameState.computerSum} - YOU WIN!`;
                    } else if (gameState.computerSum >= 17) {
                        gameState.gameOver = true;
                        if (gameState.computerSum >= gameState.playerSum) {
                            document.getElementById('gameScore').textContent = `You: ${gameState.playerSum} vs Computer: ${gameState.computerSum} - Computer Wins!`;
                        } else {
                            document.getElementById('gameScore').textContent = `You: ${gameState.playerSum} vs Computer: ${gameState.computerSum} - YOU WIN!`;
                        }
                    }

                    playDice(canvas, ctx, pauseBtn, startBtn);
                    if (!gameState.gameOver) {
                        setTimeout(() => computerPlay(canvas, ctx, pauseBtn, startBtn), 800);
                    } else {
                        gameState.running = false;
                        pauseBtn.style.display = 'none';
                        startBtn.style.display = 'block';
                        startBtn.textContent = 'Play Again?';
                    }
                }
            }

            function playDice(canvas, ctx, pauseBtn, startBtn) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ff00';
                ctx.font = '20px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('PLAYER ROLLS:', 20, 40);
                let yPos = 70;
                let playerRolls = gameState.rolls.filter(r => r.isPlayer);
                for (let roll of playerRolls.slice(-10)) {
                    ctx.font = '18px Arial';
                    ctx.fillText(roll.value, 20, yPos);
                    yPos += 25;
                }

                ctx.fillStyle = '#ff6b6b';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Player Sum: ${gameState.playerSum}`, canvas.width / 2, 100);

                if (gameState.computerTurn) {
                    ctx.fillStyle = '#ffeb3b';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText('COMPUTER ROLLS:', canvas.width - 20, 40);
                    yPos = 70;
                    let computerRolls = gameState.rolls.filter(r => !r.isPlayer);
                    for (let roll of computerRolls.slice(-10)) {
                        ctx.font = '18px Arial';
                        ctx.textAlign = 'right';
                        ctx.fillText(roll.value, canvas.width - 20, yPos);
                        yPos += 25;
                    }

                    ctx.fillStyle = '#ffeb3b';
                    ctx.font = '24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Computer Sum: ${gameState.computerSum}`, canvas.width / 2, 200);
                }

                ctx.font = '16px Arial';
                ctx.fillStyle = '#00cc00';
                ctx.textAlign = 'center';
                if (!gameState.playerStanding) {
                    ctx.fillText('Press SPACE to Roll | ENTER to Stand', canvas.width / 2, canvas.height - 20);
                }
            }

            playDice(canvas, ctx, pauseBtn, startBtn);
        }

        // STAR CLICKER GAME
        function initClicker(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            gameState = {
                stars: [],
                score: 0,
                timeLeft: 30,
                running: false,
                startTime: null,
                action: null
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.score = 0;
                    gameState.timeLeft = 30;
                    gameState.startTime = Date.now();
                    gameState.stars = [];
                    startBtn.style.display = 'none';
                    playClicker(canvas, ctx, startBtn);
                }
            };

            canvas.onclick = function(e) {
                if (!gameState.running) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                for (let i = gameState.stars.length - 1; i >= 0; i--) {
                    const star = gameState.stars[i];
                    const dist = Math.sqrt((x - star.x) ** 2 + (y - star.y) ** 2);
                    if (dist < 25) {
                        gameState.stars.splice(i, 1);
                        gameState.score++;
                        break;
                    }
                }
            };

            function playClicker(canvas, ctx, startBtn) {
                const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                gameState.timeLeft = 30 - elapsed;

                if (gameState.timeLeft <= 0) {
                    gameState.running = false;
                    gameState.timeLeft = 0;
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Time\'s Up! Play Again?';
                    document.getElementById('gameScore').textContent = `Final Score: ${gameState.score} - TIME\'S UP!`;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff00';
                    ctx.font = '32px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Time\'s Up! Score: ${gameState.score}`, canvas.width / 2, canvas.height / 2);
                    return;
                }

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Add new stars randomly
                if (Math.random() < 0.1 && gameState.stars.length < 5) {
                    gameState.stars.push({
                        x: Math.random() * (canvas.width - 50) + 25,
                        y: Math.random() * (canvas.height - 50) + 25,
                        life: 1
                    });
                }

                // Draw stars
                ctx.fillStyle = '#ffeb3b';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (let star of gameState.stars) {
                    ctx.fillText('⭐', star.x, star.y);
                }

                ctx.font = '24px Arial';
                ctx.fillStyle = '#00ff00';
                ctx.textAlign = 'center';
                ctx.fillText(`Time: ${gameState.timeLeft}s`, canvas.width / 2, 40);

                document.getElementById('gameScore').textContent = `Score: ${gameState.score} | Time: ${gameState.timeLeft}s`;

                animationId = requestAnimationFrame(() => playClicker(canvas, ctx, startBtn));
            }
        }

        // PONG GAME
        function initPong(canvas, ctx, startBtn, pauseBtn, resumeBtn) {
            gameState = {
                paddle: {x: canvas.width / 2 - 40, y: canvas.height - 20, width: 80, height: 15},
                ball: {x: canvas.width / 2, y: canvas.height / 2, radius: 8, vx: 5, vy: 5},
                score: 0,
                running: false,
                paused: false,
                action: null,
                keys: {ArrowUp: false, ArrowDown: false}
            };

            startBtn.textContent = 'Start Game';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';

            startBtn.onclick = function() {
                if (!gameState.running) {
                    gameState.running = true;
                    gameState.score = 0;
                    gameState.ball = {x: canvas.width / 2, y: canvas.height / 2, radius: 8, vx: 5, vy: 5};
                    gameState.paddle = {x: canvas.width / 2 - 40, y: canvas.height - 20, width: 80, height: 15};
                    startBtn.style.display = 'none';
                    pauseBtn.style.display = 'block';
                    playPong(canvas, ctx, pauseBtn, resumeBtn, startBtn);
                }
            };

            document.onkeydown = function(e) {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    gameState.keys[e.key] = true;
                }
            };

            document.onkeyup = function(e) {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    gameState.keys[e.key] = false;
                }
            };

            function playPong(canvas, ctx, pauseBtn, resumeBtn, startBtn) {
                if (gameState.action === 'pause') {
                    gameState.paused = true;
                    gameState.action = null;
                    pauseBtn.style.display = 'none';
                    resumeBtn.style.display = 'block';
                    drawPong(canvas, ctx);
                    return;
                }
                if (gameState.action === 'resume') {
                    gameState.paused = false;
                    gameState.action = null;
                    pauseBtn.style.display = 'block';
                    resumeBtn.style.display = 'none';
                }

                if (gameState.paused) {
                    animationId = requestAnimationFrame(() => playPong(canvas, ctx, pauseBtn, resumeBtn, startBtn));
                    return;
                }

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (gameState.keys['ArrowUp'] && gameState.paddle.x > 0) gameState.paddle.x -= 8;
                if (gameState.keys['ArrowDown'] && gameState.paddle.x < canvas.width - gameState.paddle.width) gameState.paddle.x += 8;

                gameState.ball.x += gameState.ball.vx;
                gameState.ball.y += gameState.ball.vy;

                if (gameState.ball.x - gameState.ball.radius < 0 || gameState.ball.x + gameState.ball.radius > canvas.width) {
                    gameState.ball.vx = -gameState.ball.vx;
                }

                if (gameState.ball.y - gameState.ball.radius < 0) {
                    gameState.ball.vy = -gameState.ball.vy;
                }

                if (gameState.ball.y + gameState.ball.radius > gameState.paddle.y &&
                    gameState.ball.x > gameState.paddle.x &&
                    gameState.ball.x < gameState.paddle.x + gameState.paddle.width) {
                    gameState.ball.vy = -gameState.ball.vy;
                    gameState.score++;
                }

                if (gameState.ball.y > canvas.height) {
                    gameState.running = false;
                    pauseBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Game Over! Play Again?';
                    document.getElementById('gameScore').textContent = `Score: ${gameState.score} - Game Over!`;
                    drawPong(canvas, ctx);
                    return;
                }

                drawPong(canvas, ctx);
                document.getElementById('gameScore').textContent = `Score: ${gameState.score}`;

                animationId = requestAnimationFrame(() => playPong(canvas, ctx, pauseBtn, resumeBtn, startBtn));
            }

            function drawPong(canvas, ctx) {
                // Draw paddle
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(gameState.paddle.x, gameState.paddle.y, gameState.paddle.width, gameState.paddle.height);

                // Draw ball
                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Parallax effect
        let animationIdBg;
        const bg1 = document.querySelector('.blob-1');
        const bg2 = document.querySelector('.blob-2');
        const bg3 = document.querySelector('.blob-3');

        window.addEventListener('mousemove', (e) => {
            cancelAnimationFrame(animationIdBg);
            animationIdBg = requestAnimationFrame(() => {
                const moveX = (e.clientX / window.innerWidth) * 30;
                const moveY = (e.clientY / window.innerHeight) * 30;
                
                if (bg1) bg1.style.transform = `translate(${moveX}px, ${moveY}px) scale(1)`;
                if (bg2) bg2.style.transform = `translate(${-moveX * 0.5}px, ${-moveY * 0.5}px) scale(1)`;
                if (bg3) bg3.style.transform = `translate(${moveX * 0.3}px, ${-moveY * 0.3}px) scale(1)`;
            });
        });
    </script>
</body>
</html>
